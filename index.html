  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    // Restore noscript
    const _ns = document.querySelector('noscript');
    if (_ns) _ns.style.display = '';

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

\"none\"></path>\n      </svg>\n    </div>\n    <span data-i18n=\"orb_label\" style=\"position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:.42em;text-transform:uppercase;color:var(--text-light);white-space:nowrap;text-shadow:0 0 12px rgba(226,230,235,.4)\">Тиша · нажми</span>\n  </div>\n\n  <!-- Тиша info panel -->\n  <div id=\"tisha-panel\" style=\"position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(3,3,4,.6);backdrop-filter:blur(10px)\">\n    <div style=\"position:relative;width:min(94vw,460px);max-height:86vh;overflow:auto;border-radius:32px;border:1px solid rgba(226,230,235,.18);background:linear-gradient(180deg,#101114,var(--bg-dark));padding:38px 32px 32px;box-shadow:0 30px 90px rgba(0,0,0,.75)\">\n      <button id=\"tp-close\" aria-label=\"Close panel\" aria-label=\"Close panel\" style=\"position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;border:1px solid rgba(226,230,235,.25);background:rgba(226,230,235,.05);color:var(--text-bright);font-size:14px;cursor:pointer;transition:.3s\">✕</button>\n      <div id=\"tp-body\"></div>\n    </div>\n  </div>\n\n  <!-- lang switch -->\n  <div style=\"position:fixed;top:22px;right:22px;z-index:60;display:flex;gap:4px;align-items:center;background:rgba(8,8,10,.5);backdrop-filter:blur(14px);border:1px solid rgba(226,230,235,.14);border-radius:999px;padding:5px\">\n    <button data-lang=\"ru\" class=\"langbtn\" aria-label=\"Russian\" aria-label=\"Russian\" style=\"background:var(--accent);color:var(--black);border:none;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.16em;font-weight:500;padding:8px 15px;border-radius:999px;transition:.35s\">RU</button>\n    <button data-lang=\"ua\" class=\"langbtn\" aria-label=\"Ukrainian\" aria-label=\"Ukrainian\" style=\"background:none;color:var(--text-mid);border:none;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.16em;font-weight:500;padding:8px 15px;border-radius:999px;transition:.35s\">UA</button>\n    <button data-lang=\"en\" class=\"langbtn\" aria-label=\"English\" aria-label=\"English\" style=\"background:none;color:var(--text-mid);border:none;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:.16em;font-weight:500;padding:8px 15px;border-radius:999px;transition:.35s\">EN</button>\n  </div>\n\n  <!-- sound toggle for background video -->\n  <button id=\"sound-btn\" title=\"Звук\" aria-label=\"Toggle sound\" aria-label=\"Toggle sound\" style=\"position:fixed;left:22px;bottom:22px;z-index:60;width:46px;height:46px;border-radius:50%;border:1px solid rgba(226,230,235,.25);background:rgba(8,8,10,.5);backdrop-filter:blur(12px);color:var(--text-bright);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:.3s\"></button>\n\n\n  <!-- ================= HERO ================= -->\n  <header style=\"position:relative;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:84px 24px 130px;overflow:hidden\">\n    <div style=\"position:absolute;top:44%;left:50%;width:min(92vw,720px);height:min(92vw,720px);transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;z-index:1;background:radial-gradient(circle,rgba(226,230,235,.09) 0%,rgba(155,163,175,.04) 38%,transparent 68%);animation:breathe 13s ease-in-out infinite\"></div>\n\n    <h1 style=\"position:relative;z-index:3;margin:0;opacity:0;animation:rise 1.8s cubic-bezier(.2,.7,.2,1) .3s forwards\">\n      <span data-i18n=\"word\" style=\"display:block;font-family:'Cormorant Garamond',serif;font-weight:500;text-transform:uppercase;line-height:.9;font-size:clamp(46px,10.5vw,132px);letter-spacing:.14em;background:linear-gradient(176deg,var(--gradient-top) 0%,var(--gradient-mid) 32%,var(--gradient-end) 63%,var(--gradient-bottom) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">ТИШИНА</span>\n    </h1>\n\n  </header>\n\n  <!-- ================= PHILOSOPHY ================= -->\n  <section style=\"position:relative;z-index:3;padding:clamp(96px,15vh,180px) clamp(22px,5vw,60px);text-align:center\">\n    <div class=\"reveal\" style=\"position:relative;text-align:left\">\n      <h2 data-i18n=\"ph_title\" style=\"font-family:'Cormorant Garamond',serif;font-weight:400;text-transform:uppercase;font-size:clamp(26px,4.8vw,58px);letter-spacing:.06em;line-height:1.18;margin:0 0 30px;max-width:920px;background:linear-gradient(176deg,#f2f4f7,var(--gradient-end));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">Путь к себе это лабиринт, выход из него тишина</h2>\n      <p data-i18n=\"ph_lead\" style=\"font-family:'Manrope',sans-serif;font-weight:200;font-size:clamp(20px,2.8vw,30px);line-height:1.5;letter-spacing:.01em;color:var(--text-heading);margin:0 0 34px\">Тишина это пространство между мыслей.</p>\n      <div>\n        <p data-i18n=\"ph_l1\" class=\"reveal\" style=\"font-family:'Manrope',sans-serif;font-weight:300;font-size:clamp(13.5px,1.5vw,15.5px);line-height:1.9;color:var(--text-light);margin:46px 0 0 min(16vw,calc(100% - 320px));max-width:320px\">Точка, где затихает внутренний шум, и человек приходит в контакт с собой, с потоком и с Богом.</p>\n        <p data-i18n=\"ph_l2\" class=\"reveal\" style=\"font-family:'Manrope',sans-serif;font-weight:300;font-size:clamp(13.5px,1.5vw,15.5px);line-height:1.9;color:var(--text-mid);margin:42px 0 0 min(39vw,calc(100% - 310px));max-width:300px\">Дыхание помогает войти в это состояние. Через него человек впервые по-настоящему слышит, кто он есть.</p>\n        <p data-i18n=\"ph_l3\" class=\"reveal\" style=\"font-family:'Manrope',sans-serif;font-weight:300;font-size:clamp(13.5px,1.5vw,15.5px);line-height:1.9;color:var(--text-dim);margin:42px 0 0 min(62vw,calc(100% - 300px));max-width:280px\">Здесь распаковываются смыслы всех религий, и все они сходятся в единстве и в любви.</p>\n      </div>\n      <div style=\"display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:46px;align-items:center\">\n        <span data-i18n=\"f1\" style=\"font-size:clamp(11px,1.4vw,13px);letter-spacing:.28em;text-transform:uppercase;color:var(--text-light);font-weight:400\">Тишина</span>\n        <span style=\"color:var(--muted)\">·</span>\n        <span data-i18n=\"f2\" style=\"font-size:clamp(11px,1.4vw,13px);letter-spacing:.28em;text-transform:uppercase;color:var(--text-light);font-weight:400\">Состояние</span>\n        <span style=\"color:var(--muted)\">·</span>\n        <span data-i18n=\"f3\" style=\"font-size:clamp(11px,1.4vw,13px);letter-spacing:.28em;text-transform:uppercase;color:var(--text-light);font-weight:400\">Поток</span>\n        <span style=\"color:var(--muted)\">·</span>\n        <span data-i18n=\"f4\" style=\"font-size:clamp(11px,1.4vw,13px);letter-spacing:.28em;text-transform:uppercase;color:var(--text-light);font-weight:400\">Мысли</span>\n        <span style=\"color:var(--muted)\">·</span>\n        <span data-i18n=\"f5\" style=\"font-size:clamp(11px,1.4vw,13px);letter-spacing:.28em;text-transform:uppercase;color:var(--text-light);font-weight:400\">Действия</span>\n      </div>\n    </div>\n  </section>\n\n  <!-- ================= TEMPLE ================= -->\n  <section style=\"position:relative;z-index:3;overflow:hidden;padding:clamp(96px,15vh,180px) clamp(22px,5vw,60px);text-align:center;background:radial-gradient(120% 80% at 50% 0%,rgba(20,19,17,.9),transparent 70%)\">\n    <div style=\"position:absolute;left:-8%;top:20%;width:min(46vw,380px);height:min(46vw,380px);border-radius:50%;background:radial-gradient(circle,rgba(226,230,235,.05),transparent 66%);animation:drift1 18s ease-in-out infinite;pointer-events:none\"></div>\n    <div style=\"position:absolute;right:-6%;bottom:8%;width:min(38vw,300px);height:min(38vw,300px);border-radius:50%;background:radial-gradient(circle,rgba(155,163,175,.05),transparent 66%);animation:drift2 22s ease-in-out infinite;pointer-events:none\"></div>\n    <div class=\"reveal\" style=\"position:relative;max-width:1020px;margin:0 auto;text-align:left\">\n      <div data-i18n=\"tm_eyebrow\" style=\"font-size:10px;letter-spacing:.46em;text-transform:uppercase;color:var(--text-mid);font-weight:500;margin-bottom:26px\">Сердце проекта</div>\n      <div class=\"twocol\" style=\"display:grid;grid-template-columns:.85fr 1.15fr;gap:min(8vw,90px);align-items:start\">\n      <h2 data-i18n=\"tm_title\" style=\"font-family:'Cormorant Garamond',serif;font-weight:400;text-transform:uppercase;font-size:clamp(30px,4.6vw,56px);letter-spacing:.08em;line-height:1.22;margin:0;background:linear-gradient(176deg,#f2f4f7,var(--gradient-end));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">Храм Тишины</h2>\n      <div>\n      <p data-i18n=\"tm_lead\" style=\"font-family:'Manrope',sans-serif;font-weight:200;font-size:clamp(18px,2.2vw,24px);line-height:1.55;letter-spacing:.01em;color:var(--text-heading);margin:0\">Храм Тишины это сердце проекта.</p>\n      <div>\n        <p data-i18n=\"tm_l1\" style=\"font-family:'Manrope',sans-serif;font-weight:300;font-size:clamp(13.5px,1.5vw,15.5px);line-height:1.9;color:var(--text-light);margin:28px 0 0;max-width:440px\">Пространство, где мы вместе живём из тишины каждый день.</p>\n        <p data-i18n=\"tm_l2\" style=\"font-family:'Manrope',sans-serif;font-weight:300;font-size:clamp(13.5px,1.5vw,15.5px);line-height:1.9;color:var(--text-mid);margin:22px 0 0;max-width:440px\">Храм всегда открыт, и в нём всегда кто-то дышит.</p>\n        <p data-i18n=\"tm_l3\" style=\"font-family:'Manrope',sans-serif;font-weight:300;font-size:clamp(13.5px,1.5vw,15.5px);line-height:1.9;color:var(--text-dim);margin:22px 0 0;max-width:440px\">Ты заходишь в любой момент, и поле уже живое.</p>\n      </div>\n      <div data-i18n=\"tm_note\" style=\"margin-top:36px;font-family:'Manrope',sans-serif;font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--text-mid)\">Сегодня онлайн · завтра живой ретрит-центр</div>\n      </div>\n      </div>\n    </div>\n  </section>\n\n\n  <!-- ================= GATES ================= -->\n  <section style=\"position:relative;z-index:3;padding:clamp(80px,12vh,150px) clamp(22px,5vw,60px);max-width:1100px;margin:0 auto\">\n    <div class=\"reveal\" style=\"margin-bottom:44px;text-align:center\">\n      <div data-i18n=\"gt_eyebrow\" style=\"font-size:10px;letter-spacing:.46em;text-transform:uppercase;color:var(--text-mid);font-weight:500;margin-bottom:22px\">Врата</div>\n      <h2 data-i18n=\"gt_title\" style=\"font-family:'Cormorant Garamond',serif;font-weight:400;text-transform:uppercase;font-size:clamp(28px,4.4vw,50px);letter-spacing:.05em;background:linear-gradient(176deg,#f2f4f7,var(--gradient-end));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">Наши направления</h2>\n      <p data-i18n=\"gt_intro\" style=\"font-family:'Manrope',sans-serif;font-weight:200;font-size:clamp(16px,2vw,22px);line-height:1.5;color:var(--text-light);margin-top:18px\">Всё это ведёт человека в одно поле.</p>\n    </div>\n    <div class=\"reveal\" id=\"gates\" style=\"display:flex;flex-wrap:wrap;justify-content:center;gap:12px\"></div>\n  </section>\n\n  <!-- ================= YURA ================= -->\n  <section style=\"position:relative;z-index:3;padding:clamp(90px,14vh,170px) clamp(22px,5vw,60px);max-width:1160px;margin:0 auto\">\n    <div style=\"max-width:760px\">\n      <div class=\"reveal\">\n        <div data-i18n=\"y_eyebrow\" style=\"font-size:10px;letter-spacing:.46em;text-transform:uppercase;color:var(--text-mid);font-weight:500;margin-bottom:24px\">Проводник</div>\n        <h2 data-i18n=\"y_title\" style=\"font-family:'Cormorant Garamond',serif;font-weight:400;text-transform:uppercase;font-size:clamp(30px,4.6vw,54px);letter-spacing:.04em;margin-bottom:30px;background:linear-gradient(176deg,#f2f4f7,var(--gradient-end));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">Юрий Кручин</h2>\n        <div data-i18n=\"y_body\" style=\"font-family:'Manrope',sans-serif;font-size:clamp(15px,1.6vw,19px);font-weight:300;line-height:1.9;color:var(--text-body);max-width:560px\"></div>\n        <div data-i18n=\"y_cap\" style=\"margin-top:36px;font-family:'Manrope',sans-serif;font-weight:300;font-style:italic;font-size:14px;color:var(--text-light)\">«Тем, что меня заряжает, иду делиться.»</div>\n      </div>\n    </div>\n  </section>\n\n  <!-- ================= FAQ ================= -->\n  <section style=\"position:relative;z-index:3;padding:clamp(80px,12vh,150px) clamp(22px,5vw,60px);max-width:940px;margin:0 auto\">\n    <div class=\"reveal\" style=\"margin-bottom:44px;text-align:center\">\n      <div data-i18n=\"faq_eyebrow\" style=\"font-size:10px;letter-spacing:.46em;text-transform:uppercase;color:var(--text-mid);font-weight:500;margin-bottom:22px\">Направления</div>\n      <h2 data-i18n=\"faq_title\" style=\"font-family:'Cormorant Garamond',serif;font-weight:400;text-transform:uppercase;font-size:clamp(28px,4.4vw,50px);letter-spacing:.05em;background:linear-gradient(176deg,#f2f4f7,var(--gradient-end));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">Вопросы и ответы</h2>\n    </div>\n    <div class=\"reveal\" id=\"faq\" style=\"border-radius:28px;overflow:hidden;border:1px solid rgba(226,230,235,.1)\"></div>\n  </section>\n\n  <!-- ================= CONNECT ================= -->\n  <section style=\"position:relative;z-index:3;overflow:hidden;padding:clamp(90px,14vh,170px) clamp(22px,5vw,60px);text-align:center;background:radial-gradient(120% 90% at 50% 100%,rgba(20,19,17,.92),transparent 72%)\">\n    <div class=\"reveal\" style=\"max-width:720px;margin:0 auto\">\n      <div data-i18n=\"c_eyebrow\" style=\"font-size:10px;letter-spacing:.46em;text-transform:uppercase;color:var(--text-mid);font-weight:500;margin-bottom:22px\">Связь</div>\n      <h2 data-i18n=\"c_title\" style=\"font-family:'Cormorant Garamond',serif;font-weight:400;text-transform:uppercase;font-size:clamp(30px,5vw,58px);letter-spacing:.05em;margin-bottom:44px;background:linear-gradient(176deg,#f2f4f7,var(--gradient-end));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">Оставайся в поле</h2>\n      <div style=\"display:flex;justify-content:center;flex-wrap:wrap;gap:12px\">\n        <a href=\"https://www.instagram.com/yura_kruchin/\" target=\"_blank\" rel=\"noopener\" class=\"social\" aria-label=\"Instagram\" aria-label=\"Instagram\" style=\"display:inline-flex;align-items:center;gap:11px;border:1px solid rgba(226,230,235,.16);border-radius:999px;padding:15px 28px;font-family:'Manrope',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-bright);font-weight:500;transition:.4s\"><span style=\"width:5px;height:5px;background:currentColor;border-radius:50%;opacity:.7\"></span>Instagram</a>\n        <a href=\"https://youtu.be/u8WaKpRnYa8\" target=\"_blank\" rel=\"noopener\" class=\"social\" aria-label=\"YouTube\" aria-label=\"YouTube\" style=\"display:inline-flex;align-items:center;gap:11px;border:1px solid rgba(226,230,235,.16);border-radius:999px;padding:15px 28px;font-family:'Manrope',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-bright);font-weight:500;transition:.4s\"><span style=\"width:5px;height:5px;background:currentColor;border-radius:50%;opacity:.7\"></span>YouTube</a>\n        <a href=\"https://t.me/love_kruchin\" target=\"_blank\" rel=\"noopener\" class=\"social\" aria-label=\"Telegram\" aria-label=\"Telegram\" style=\"display:inline-flex;align-items:center;gap:11px;border:1px solid rgba(226,230,235,.16);border-radius:999px;padding:15px 28px;font-family:'Manrope',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-bright);font-weight:500;transition:.4s\"><span style=\"width:5px;height:5px;background:currentColor;border-radius:50%;opacity:.7\"></span>Telegram</a>\n        <a href=\"https://silence.kruchin.com\" target=\"_blank\" rel=\"noopener\" class=\"social\" aria-label=\"Silence website\" aria-label=\"Silence website\" style=\"display:inline-flex;align-items:center;gap:11px;border:1px solid rgba(226,230,235,.28);border-radius:999px;padding:15px 28px;font-family:'Manrope',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-white);font-weight:500;transition:.4s\"><span style=\"width:5px;height:5px;background:currentColor;border-radius:50%;opacity:.7\"></span><span data-i18n=\"c_site\">Путь Тишины</span></a>\n      </div>\n    </div>\n  </section>\n\n\n  \n\n\n\n  <!-- ================= FOOTER ================= -->\n  <footer style=\"position:relative;z-index:3;text-align:center;padding:60px 24px 40px;border-top:1px solid rgba(226,230,235,.08)\">\n    <p style=\"font-family:'Manrope',sans-serif;font-weight:300;font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase\" data-i18n=\"foot\">Путь Тишины · Юрий Кручин · <span id=\"yr\"></span></p>\n  </footer>\n</div>\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals(){ return {}; }\n\n  componentDidMount(){\n    const root = this.el || document;\n    const findOne = (s)=>root.querySelector(s);\n    const findAll = (s)=>Array.from(root.querySelectorAll(s));\n\n    const GATES = {\n      ru:[\n        {t:\"Путь Тишины\", s:\"on\",    href:\"https://silence.kruchin.com\"},\n        {t:\"Маленькие продукты\", s:\"on\"},\n        {t:\"Проводники Тишины\", s:\"on\"},\n        {t:\"Приложение «Тиша»\", s:\"birth\"},\n        {t:\"Кино\", s:\"birth\", href:\"https://youtu.be/u8WaKpRnYa8\"},\n        {t:\"YouTube\", s:\"birth\", href:\"https://youtu.be/u8WaKpRnYa8\"},\n        {t:\"Музыка\", s:\"birth\"},\n        {t:\"Ретрит-центр\", s:\"soon\"},\n        {t:\"Kruchin-shop\", s:\"soon\"}\n      ],\n      ua:[\n        {t:\"Шлях Тиші\", s:\"on\", href:\"https://silence.kruchin.com\"},\n        {t:\"Маленькі продукти\", s:\"on\"},\n        {t:\"Провідники Тиші\", s:\"on\"},\n        {t:\"Застосунок «Тиша»\", s:\"birth\"},\n        {t:\"Кіно\", s:\"birth\", href:\"https://youtu.be/u8WaKpRnYa8\"},\n        {t:\"YouTube\", s:\"birth\", href:\"https://youtu.be/u8WaKpRnYa8\"},\n        {t:\"Музика\", s:\"birth\"},\n        {t:\"Ретрит-центр\", s:\"soon\"},\n        {t:\"Kruchin-shop\", s:\"soon\"}\n      ],\n      en:[\n        {t:\"The Path of Silence\", s:\"on\", href:\"https://silence.kruchin.com\"},\n        {t:\"Small products\", s:\"on\"},\n        {t:\"Guides of Silence\", s:\"on\"},\n        {t:\"The “Tisha” app\", s:\"birth\"},\n        {t:\"The film\", s:\"birth\", href:\"https://youtu.be/u8WaKpRnYa8\"},\n        {t:\"YouTube\", s:\"birth\", href:\"https://youtu.be/u8WaKpRnYa8\"},\n        {t:\"Music\", s:\"birth\"},\n        {t:\"Retreat centre\", s:\"soon\"},\n        {t:\"Kruchin-shop\", s:\"soon\"}\n      ]\n    };\n    const STLABEL = {\n      ru:{on:\"Уже работает\",birth:\"Сейчас рождается\",soon:\"В будущем\"},\n      ua:{on:\"Вже працює\",birth:\"Зараз народжується\",soon:\"У майбутньому\"},\n      en:{on:\"Already live\",birth:\"Being born now\",soon:\"In the future\"}\n    };\n    const DOTCOL = {on:\"#e2e6eb\",birth:\"#9ba3af\",soon:\"#6e7480\"};\n\n    const FAQ = {\n      ru:[\n        [\"Какие направления уже работают?\",\"Храм Тишины и основной продукт «Путь Тишины» на полгода и на год. Маленькие продукты как точки входа. И проводники тишины, которые ведут людей в это состояние внутри Храма.\"],\n        [\"Какие проекты сейчас на этапе запуска?\",\"YouTube с мини-подкастами с друзьями и людьми, которые встречаются на пути. И авторская музыка под каждую практику, по несколько минут, которые прошивают смыслами.\"],\n        [\"Что появится в будущем?\",\"Приложение «Тиша»: персональный проводник в тишину прямо в телефоне, с дыхательными практиками, курсами и живым откликом. Кино про тишину из реальной жизни: команда живёт с Юрой на Бали, мы снимаем и проживаем это, тизер идёт на Каннский фестиваль. Оффлайн ретрит-центр, живое место, куда мы перенесём жизнь из тишины. И Kruchin-shop: бренд сакральных предметов, одежды и серия книг.\"],\n        [\"Что входит в основной продукт «Путь Тишины»?\",\"«Путь Тишины» это основной продукт на полгода и на год. Внутри записанные уроки, ежедневная утренняя практика, рефлексии, живые эфиры раз в месяц и проводники, которые идут рядом. Это не про информацию, а про состояние: каждый день ты возвращаешься в пространство между мыслей и живёшь из него. <a href='https://silence.kruchin.com' target='_blank' rel='noopener' style='color:var(--text-bright);border-bottom:1px solid rgba(226,230,235,.35);text-decoration:none'>Открыть сайт продукта</a>\"]\n      ],\n      ua:[\n        [\"Які напрями вже працюють?\",\"Храм Тиші та основний продукт «Шлях Тиші» на пів року і на рік. Маленькі продукти як точки входу. І провідники тиші, які ведуть людей у цей стан усередині Храму.\"],\n        [\"Які проєкти зараз на етапі запуску?\",\"YouTube з міні-подкастами з друзями і людьми, які зустрічаються на шляху. І авторська музика під кожну практику, по кілька хвилин, які прошивають смислами.\"],\n        [\"Що зʼявиться в майбутньому?\",\"Застосунок «Тиша»: персональний провідник у тишу просто в телефоні, з дихальними практиками, курсами і живим відгуком. Кіно про тишу з реального життя: команда живе з Юрою на Балі, ми знімаємо і проживаємо це, тизер іде на Каннський фестиваль. Офлайн ретрит-центр, живе місце, куди ми перенесемо життя з тиші. І Kruchin-shop: бренд сакральних предметів, одягу і серія книг.\"],\n        [\"Що входить в основний продукт «Шлях Тиші»?\",\"«Шлях Тиші» це основний продукт на пів року і на рік. Всередині записані уроки, щоденна ранкова практика, рефлексії, живі ефіри раз на місяць і провідники, які йдуть поруч. Це не про інформацію, а про стан: щодня ти повертаєшся у простір поміж думок і живеш із нього. <a href='https://silence.kruchin.com' target='_blank' rel='noopener' style='color:var(--text-bright);border-bottom:1px solid rgba(226,230,235,.35);text-decoration:none'>Відкрити сайт продукту</a>\"]\n      ],\n      en:[\n        [\"Which directions already work?\",\"The Temple of Silence and the core product “The Path of Silence,” for six months and a year. Small products as entry points. And guides of silence who lead people into this state inside the Temple.\"],\n        [\"Which projects are launching now?\",\"YouTube with mini-podcasts with friends and the people met along the way. And original music for each practice, a few minutes long, threading meaning through you.\"],\n        [\"What is coming in the future?\",\"The “Tisha” app: a personal guide into silence right in your phone, with breathing practices, courses and a living response. A film about silence drawn from real life: the team lives with Yura in Bali, we shoot it and live it, and the teaser is going to the Cannes Festival. An offline retreat centre, a living place where we will carry the life from silence. And Kruchin-shop: a brand of sacred objects, clothing and a series of books.\"],\n        [\"What is inside the core product?\",\"“The Path of Silence” is the core product, for six months and for a year. Inside: recorded lessons, a daily morning practice, reflections, monthly live sessions and guides walking beside you. It is not about information but about a state: every day you return to the space between thoughts and live from it. <a href='https://silence.kruchin.com' target='_blank' rel='noopener' style='color:var(--text-bright);border-bottom:1px solid rgba(226,230,235,.35);text-decoration:none'>Open the product site</a>\"]\n      ]\n    };\n\n    const DICT = {\n      ru:{brand_sub:\"ПУТЬ ТИШИНЫ\",hero_top:\"Община Тишины · Бали\",word:\"ТИШИНА\",hero_sub:\"Путь Тишины · Юрий Кручин\",hero_phrase:\"«Путь к себе это лабиринт, выход тишина»\",teaser:\"Смотреть тизер\",scroll:\"Тишина\",\n        ph_eyebrow:\"Что такое тишина\",ph_title:\"Путь к себе это лабиринт, выход из него тишина\",\n        ph_lead:\"Тишина это пространство между мыслей.\",\n        ph_l1:\"Точка, где затихает внутренний шум, и человек приходит в контакт с собой, с потоком и с Богом.\",\n        ph_l2:\"Дыхание помогает войти в это состояние. Через него человек впервые по-настоящему слышит, кто он есть.\",\n        ph_l3:\"Здесь распаковываются смыслы всех религий, и все они сходятся в единстве и в любви.\",\n        f1:\"Тишина\",f2:\"Состояние\",f3:\"Поток\",f4:\"Мысли\",f5:\"Действия\",\n        tm_eyebrow:\"Сердце проекта\",tm_title:\"Храм Тишины\",\n        tm_lead:\"Храм Тишины это сердце проекта.\",\n        tm_l1:\"Пространство, где мы вместе живём из тишины каждый день.\",\n        tm_l2:\"Храм всегда открыт, и в нём всегда кто-то дышит.\",\n        tm_l3:\"Ты заходишь в любой момент, и поле уже живое.\",\n        tm_note:\"Сегодня онлайн · завтра живой ретрит-центр\",\n        teaser_tag:\"Кино о тишине · Бали\",\n        gt_eyebrow:\"Врата\",gt_title:\"Наши направления\",gt_intro:\"Всё это ведёт человека в одно поле.\",\n        ph_photo:\"фото Юры\",y_eyebrow:\"Проводник\",y_title:\"Юрий Кручин\",y_cap:\"«Тем, что меня заряжает, иду делиться.»\",\n        y_body:\"<p style='margin-bottom:1.3em'>Больше двадцати лет иду в потоке. Долгое время был в бизнесе и собирал вокруг себя команды, организовывал самые масштабные церемонии достояния в Украине с досками Садху, которые многие знают как «гвозди».</p><p style='color:#848b96'>Потом ушёл в личную тишину. Целый год глубокого самопознания, ретриты, практики, много дыхания и много молчания. Оттуда вырос этот проект.</p>\",\n        faq_eyebrow:\"Направления\",faq_title:\"Вопросы и ответы\",\n        c_eyebrow:\"Связь\",c_title:\"Оставайся в поле\",c_site:\"Путь Тишины\",foot:\"Путь Тишины · Юрий Кручин · \"},\n      ua:{brand_sub:\"ШЛЯХ ТИШІ\",hero_top:\"Спільнота Тиші · Балі\",word:\"ТИША\",hero_sub:\"Шлях Тиші · Юрій Кручін\",hero_phrase:\"«Шлях до себе це лабіринт, вихід тиша»\",teaser:\"Дивитися тизер\",scroll:\"Тиша\",\n        ph_eyebrow:\"Що таке тиша\",ph_title:\"Шлях до себе це лабіринт, вихід із нього тиша\",\n        ph_lead:\"Тиша це простір поміж думок.\",\n        ph_l1:\"Точка, де стихає внутрішній шум, і людина приходить у контакт із собою, з потоком і з Богом.\",\n        ph_l2:\"Дихання допомагає увійти в цей стан. Через нього людина вперше по-справжньому чує, хто вона є.\",\n        ph_l3:\"Тут розпаковуються смисли всіх релігій, і всі вони сходяться в єдності і в любові.\",\n        f1:\"Тиша\",f2:\"Стан\",f3:\"Потік\",f4:\"Думки\",f5:\"Дії\",\n        tm_eyebrow:\"Серце проєкту\",tm_title:\"Храм Тиші\",\n        tm_lead:\"Храм Тиші це серце проєкту.\",\n        tm_l1:\"Простір, де ми разом живемо з тиші кожного дня.\",\n        tm_l2:\"Храм завжди відкритий, і в ньому завжди хтось дихає.\",\n        tm_l3:\"Ти заходиш у будь-яку мить, і поле вже живе.\",\n        tm_note:\"Сьогодні онлайн · завтра живий ретрит-центр\",\n        teaser_tag:\"Кіно про тишу · Балі\",\n        gt_eyebrow:\"Врата\",gt_title:\"Наші напрями\",gt_intro:\"Усе це веде людину в одне поле.\",\n        ph_photo:\"фото Юри\",y_eyebrow:\"Провідник\",y_title:\"Юрій Кручін\",y_cap:\"«Тим, що мене заряджає, іду ділитися.»\",\n        y_body:\"<p style='margin-bottom:1.3em'>Більше двадцяти років іду в потоці. Довгий час був у бізнесі і збирав навколо себе команди, організовував наймасштабніші церемонії достояння в Україні з дошками Садху, які багато хто знає як «цвяхи».</p><p style='color:#848b96'>Потім пішов у особисту тишу. Цілий рік глибокого самопізнання, ретрити, практики, багато дихання і багато мовчання. Звідти виріс цей проєкт.</p>\",\n        faq_eyebrow:\"Напрями\",faq_title:\"Питання та відповіді\",\n        c_eyebrow:\"Звʼязок\",c_title:\"Залишайся в полі\",c_site:\"Шлях Тиші\",foot:\"Шлях Тиші · Юрій Кручін · \"},\n      en:{brand_sub:\"THE PATH OF SILENCE\",hero_top:\"Silence Community · Bali\",word:\"SILENCE\",hero_sub:\"The Path of Silence · Yuriy Kruchin\",hero_phrase:\"“The path to yourself is a labyrinth, the way out is silence”\",teaser:\"Watch the teaser\",scroll:\"Silence\",\n        ph_eyebrow:\"What silence is\",ph_title:\"The path to yourself is a labyrinth, the way out is silence\",\n        ph_lead:\"Silence is the space between thoughts.\",\n        ph_l1:\"The point where the inner noise goes quiet, and a person comes into contact with themselves, with the flow, and with God.\",\n        ph_l2:\"Breath helps you enter this state. Through it a person truly hears, for the first time, who they are.\",\n        ph_l3:\"Here the meanings of all religions unfold, and they all meet in unity and in love.\",\n        f1:\"Silence\",f2:\"State\",f3:\"Flow\",f4:\"Thoughts\",f5:\"Actions\",\n        tm_eyebrow:\"The heart of the project\",tm_title:\"The Temple of Silence\",\n        tm_lead:\"The Temple of Silence is the heart of the project.\",\n        tm_l1:\"A space where we live from silence together, every day.\",\n        tm_l2:\"The temple is always open, and someone is always breathing inside.\",\n        tm_l3:\"You walk in at any moment, and the field is already alive.\",\n        tm_note:\"Online today · a living retreat centre tomorrow\",\n        teaser_tag:\"A film about silence · Bali\",\n        gt_eyebrow:\"The gates\",gt_title:\"Our directions\",gt_intro:\"All of it leads a person into one field.\",\n        ph_photo:\"Yura's photo\",y_eyebrow:\"The guide\",y_title:\"Yuriy Kruchin\",y_cap:\"“What charges me, goes on to be shared.”\",\n        y_body:\"<p style='margin-bottom:1.3em'>For more than twenty years I have moved in the flow. For a long time I was in business and gathered teams around me, and I organised the largest ceremonies of attainment in Ukraine, with the Sadhu boards many know as “nails.”</p><p style='color:#848b96'>Then I went into personal silence. A whole year of deep self-knowledge, retreats, practices, much breathing and much stillness. This project grew from there.</p>\",\n        faq_eyebrow:\"Directions\",faq_title:\"Questions & answers\",\n        c_eyebrow:\"Connect\",c_title:\"Stay in the field\",c_site:\"The Path of Silence\",foot:\"The Path of Silence · Yuriy Kruchin · \"}\n    };\n    const HTMLK = new Set([\"y_body\"]);\n\n    const TISHA = {\n      ru:{label:\"Тиша · нажми\",title:\"Знакомьтесь, Тиша\",sub:\"Твой проводник в тишину\",\n        about:\"Не бот с дежурными фразами и не ещё один курс. Тиша рядом каждый день и ведёт тебя через твою живую жизнь к трём состояниям: к радости просто оттого, что ты есть, к целостности внутри и к любви к себе. Он слышит и текст, и голос, и он помнит тебя.\",\n        listTitle:\"Что он умеет\",\n        list:[\"Разобрать ситуацию: вместе дойти до сути и до практики Юры под тебя\",\"Подышать: короткая дыхательная практика прямо в чате\",\"Мой кабинет: живая карта твоего пути и зон роста\",\"Фокус дня: три осознанных фокуса на день\"],\n        note:\"Тиша проводник, а не врач. За твоим состоянием мягко следит и живая команда заботы.\",\n        status:\"Сейчас эта функция доступна участникам Храма Тишины.\",\n        cta:\"Перейти в Храм Тишины\"},\n      ua:{label:\"Тиша · натисни\",title:\"Знайомтесь, Тиша\",sub:\"Твій провідник у тишу\",\n        about:\"Не бот з черговими фразами і не ще один курс. Тиша поруч щодня і веде тебе через твоє живе життя до трьох станів: до радості просто від того, що ти є, до цілісності всередині і до любові до себе. Він чує і текст, і голос, і він памʼятає тебе.\",\n        listTitle:\"Що він уміє\",\n        list:[\"Розібрати ситуацію: разом дійти до суті і до практики Юри під тебе\",\"Подихати: коротка дихальна практика просто в чаті\",\"Мій кабінет: жива карта d(cta);\n      // Update orb label\n      const lbl=findOne(\"[data-i18n='orb_label']\"); if(lbl) lbl.textContent=d.label;\n    };;\n\n    const renderGates = (lang)=>{\n      const box = findOne(\"#gates\"); if(!box) return;\n      box.textContent = \"\";\n      GATES[lang].forEach(g=>{\n        const linked = !!g.href;\n        const node = document.createElement(linked?\"a\":\"div\");\n        if(linked){ node.href=g.href; node.target=\"_blank\"; node.rel=\"noopener\"; node.setAttribute(\"aria-label\", g.t); }\n        node.className = \"gate-item\";\n        const dot = document.createElement(\"span\");\n        dot.className = \"gate-dot\";\n        dot.style.background = DOTCOL[g.s];\n        dot.style.boxShadow = g.s==='soon'?'none':`0 0 8px ${DOTCOL[g.s]}`;\n        node.appendChild(dot);\n        const name = document.createElement(\"span\");\n        name.className = \"gate-name\";\n        name.textContent = g.t;\n        node.appendChild(name);\n        const label = document.createElement(\"span\");\n        label.className = \"gate-label\";\n        label.textContent = STLABEL[lang][g.s];\n        node.appendChild(label);\n        if(linked){\n          const arrow = document.createElement(\"span\");\n          arrow.className = \"gate-arrow\";\n          arrow.textContent = \"\\u2197\";\n          node.appendChild(arrow);\n        }\n        box.appendChild(node);\n      });\n    };\n\n    const renderFaq = (lang)=>{\n      const box = findOne(\"#faq\"); if(!box) return;\n      box.textContent = \"\";\n      FAQ[lang].forEach((qa,i)=>{\n        const item = document.createElement(\"div\");\n        item.style.cssText = \"border-bottom:1px solid rgba(226,230,235,.1)\";\n        if(i===FAQ[lang].length-1) item.style.borderBottom=\"none\";\n        const q = document.createElement(\"button\");\n        q.type=\"button\";\n        q.setAttribute(\"aria-expanded\",\"false\");\n        q.setAttribute(\"role\",\"button\");\n        q.className = \"faq-question\";\n        q.style.cssText=\"width:100%;background:none;border:none;color:var(--text-body);cursor:pointer;font-family:'Manrope',sans-serif;display:flex;justify-content:space-between;align-items:center;gap:24px;text-align:left;padding:26px 26px;font-weight:400;font-size:clamp(15px,1.8vw,20px);transition:color .4s\";\n        const qText = document.createElement(\"span\");\n        qText.textContent = qa[0];\n        q.appendChild(qText);\n        const pm = document.createElement(\"span\");\n        pm.className = \"pm\";\n        const pmLine = document.createElement(\"span\");\n        pmLine.className = \"pm-line\";\n        pm.appendChild(pmLine);\n        const pmv = document.createElement(\"span\");\n        pmv.className = \"pmv\";\n        pm.appendChild(pmv);\n        q.appendChild(pm);\n        const a = document.createElement(\"div\");\n        a.style.cssText=\"max-height:0;overflow:hidden;transition:max-height .5s ease\";\n        const p = document.createElement(\"p\");\n        p.className = \"faq-answer\";\n        p.innerHTML = qa[1];\n        a.appendChild(p);\n        q.addEventListener(\"click\",()=>{\n          const open = item.dataset.open===\"1\";\n          q.setAttribute(\"aria-expanded\", String(!open));\n          box.querySelectorAll(\"[data-open='1']\").forEach(o=>{ o.dataset.open=\"0\"; o.querySelector(\".a\").style.maxHeight=\"0px\"; o.querySelector(\".pmv\").style.transform=\"translateX(-50%) scaleY(1)\"; o.querySelector(\"button\").style.color=\"var(--text-body)\"; });\n          if(!open){ item.dataset.open=\"1\"; a.style.maxHeight=a.scrollHeight+\"px\"; q.querySelector(\".pmv\").style.transform=\"translateX(-50%) scaleY(0)\"; q.style.color=\"var(--text-white)\"; }\n        });\n        a.className=\"a\";\n        item.appendChild(q); item.appendChild(a);\n        box.appendChild(item);\n      });\n    };\n\n    let curLang=\"ru\";\n    const setLang = (lang)=>{\n      curLang=lang;\n      document.documentElement.lang=lang;\n      const d=DICT[lang];\n      findAll(\"[data-i18n]\").forEach(el=>{\n        const k=el.getAttribute(\"data-i18n\");\n        if(d[k]===undefined) return;\n        if(HTMLK.has(k)) el.innerHTML=d[k]; else el.textContent=d[k];\n      });\n      findAll(\".langbtn\").forEach(b=>{\n        const on=b.dataset.lang===lang;\n        b.style.background=on?\"#e2e6eb\":\"none\";\n        b.style.color=on?\"#0a0908\":\"#9ba3af\";\n      });\n      renderGates(lang);\n      renderFaq(lang);\n      renderTisha(lang);\n    };\n    findAll(\".langbtn\").forEach(b=>b.addEventListener(\"click\",()=>setLang(b.dataset.lang)));\n\n    // year\n    const yr=findOne(\"#yr\"); if(yr) yr.textContent=new Date().getFullYear();\n\n    // reveal on scroll\n    const io=new IntersectionObserver((es)=>es.forEach(e=>{\n      if(e.isIntersecting){ e.target.style.opacity=\"1\"; e.target.style.transform=\"none\"; io.unobserve(e.target); }\n    }),{threshold:0.12});\n    findAll(\".reveal\").forEach(el=>{ el.style.opacity=\"0\"; el.style.transform=\"translateY(34px)\"; el.style.transition=\"opacity 1.1s ease, transform 1.1s cubic-bezier(.2,.7,.2,1)\"; io.observe(el); });\n\n    // orb cursor parallax\n    const orb=findOne(\"#tisha-orb\");\n    if(orb){\n      window.addEventListener(\"mousemove\",(e)=>{\n        const dx=(e.clientX/window.innerWidth-0.5)*-30;\n        const dy=(e.clientY/window.innerHeight-0.5)*-30;\n        orb.style.transform=`translate(${dx}px,${dy}px)`;\n      },{passive:true});\n      orb.addEventListener(\"click\",()=>{ const p=findOne(\"#tisha-panel\"); if(p) p.style.display=\"flex\"; });\n    }\n    const tp=findOne(\"#tisha-panel\"), tpClose=findOne(\"#tp-close\");\n    if(tpClose) tpClose.addEventListener(\"click\",()=>{ tp.style.display=\"none\"; });\n    if(tp) tp.addEventListener(\"click\",(e)=>{ if(e.target===tp) tp.style.display=\"none\"; });\n    window.addEventListener(\"keydown\",(e)=>{ if(e.key===\"Escape\" && tp) tp.style.display=\"none\"; });\n    window.addEventListener(\"beforeunload\",()=>{ for(const u of Object.keys(window.__resourceBlobs||{})) try{URL.revokeObjectURL(u)}catch(e){} });\n\n    // force-start the muted background teaser via YouTube API (plain autoplay can silently fail)\n    const hideCover=()=>{ const c=findOne(\"#bg-cover\"); if(c) c.style.opacity=\"0\"; };\n    setTimeout(hideCover,5000);\n    const startBg=()=>{\n      try{\n        new window.YT.Player(\"bg-video\",{\n          events:{\n            onReady:(e)=>{ e.target.mute(); e.target.playVideo(); },\n            onStateChange:(e)=>{\n              if(e.data===window.YT.PlayerState.PLAYING){ setTimeout(hideCover,600); }\n              if(e.data===window.YT.PlayerState.ENDED){ e.target.seekTo(0); e.target.playVideo(); }\n            }\n          }\n        });\n      }catch(err){}\n    };\n    if(window.YT && window.YT.Player){ startBg(); }\n    else{\n      const prev=window.onYouTubeIframeAPIReady;\n      window.onYouTubeIframeAPIReady=()=>{ if(prev) prev(); startBg(); };\n      if(!document.querySelector(\"script[src*='youtube.com/iframe_api']\")){\n        const s=document.createElement(\"script\"); s.src=\"https://www.youtube.com/iframe_api\"; document.head.appendChild(s);\n      }\n    }\n    // extra nudge on first user interaction (mobile browsers sometimes pause hidden autoplay)\n    const nudge=()=>{ const f=findOne(\"#bg-video\"); if(f && f.contentWindow){ f.contentWindow.postMessage('{\"event\":\"command\",\"func\":\"playVideo\",\"args\":\"\"}','https://www.youtube.com'); } };\n    window.addEventListener(\"touchstart\",nudge,{once:true,passive:true});\n    window.addEventListener(\"click\",nudge,{once:true});\n\n    // sound toggle for background video\n    const sbtn=findOne(\"#sound-btn\");\n    const icoOff='<svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11 5 6 9H3v6h3l5 4z\"></path><line x1=\"16\" y1=\"9.5\" x2=\"20.5\" y2=\"14\"></line><line x1=\"20.5\" y1=\"9.5\" x2=\"16\" y2=\"14\"></line></svg>';\n    const icoOn='<svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11 5 6 9H3v6h3l5 4z\"></path><path d=\"M15.5 8.5a5 5 0 0 1 0 7\"></path><path d=\"M18.5 6a9 9 0 0 1 0 12\"></path></svg>';\n    const postBg=(func)=>{ const f=findOne(\"#bg-video\"); if(f && f.contentWindow) f.contentWindow.postMessage(JSON.stringify({event:\"command\",func:func,args:\"\"}),\"*\"); };\n    let soundOn=false;\n    if(sbtn){\n      sbtn.innerHTML=icoOff;\n      sbtn.addEventListener(\"click\",()=>{\n        soundOn=!soundOn;\n        if(soundOn){ postBg(\"unMute\"); postBg(\"playVideo\"); } else { postBg(\"mute\"); }\n        sbtn.innerHTML=soundOn?icoOn:icoOff;\n      });\n    }\n\n    setLang(\"ru\");\n  }\n}\n<\/script>\n\n\n</body></html>"
